name: Deploy Components

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Kubernetes"]
    types:
      - completed
    branches:
      - main

jobs:
  build-inventory:
    name: "Build Inventory"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./terraform/proxmox

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Python 3
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Ensure Inventory Directory Exists
        run: mkdir -p ../../ansible/inventory

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -no-color

      - name: Generate Inventory
        env:
          TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
          TF_VAR_proxmox_user: ${{ secrets.PROXMOX_USER }}
          TF_VAR_proxmox_api_token_id: ${{ secrets.PROXMOX_API_TOKEN_ID }}
          TF_VAR_proxmox_api_token_secret: ${{ secrets.PROXMOX_API_TOKEN_SECRET }}
          TF_VAR_ssh_keys: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform apply -target=local_file.ansible_inventory -auto-approve -no-color

      - name: Create SSH Key File
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Fetch Kubeconfig
        working-directory: ./ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i inventory/hosts.yml --private-key ~/.ssh/id_rsa -b -v fetch-kubeconfig.yml

  deploy-metallb:
    name: "Deploy MetalLB"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    
    needs: build-inventory
    steps: 
      - name: Deploy MetalLB
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf
          kubectl apply -f kubernetes/metallb/metallb.yaml
          kubectl wait --for=condition=Available deployment/controller -n metallb-system --timeout=120s
          kubectl apply -f kubernetes/metallb/ip-pool.yaml
          kubectl get pods -n metallb-system

  # deploy-ingress-nginx:
  #   name: "Deploy Ingress Nginx"
  #   runs-on:
  #     group: kloudke
  #   defaults:
  #     run:
  #       working-directory: ./
  #   needs: deploy-metallb
  #   steps: 
  #     - name: Deploy Ingress Nginx
  #       run: |
  #         export KUBECONFIG=ansible/inventory/artifacts/admin.conf    
  #         kubectl apply -f kubernetes/ingress-nginx/
  #         kubectl get svc -n ingress-nginx

  deploy-traefik:
    name: "Deploy Traefik"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    needs: deploy-metallb
    steps: 
      - name: Setup Helm
        uses: azure/setup-helm@v4.2.0

      - name: Deploy Traefik
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf    
          helm repo add traefik https://traefik.github.io/charts
          helm repo update
          helm install traefik traefik/traefik \
            -f kubernetes/traefik/values.yaml \
            --wait
          kubectl get pods -n traefik
          kubectl describe GatewayClass traefik

  deploy-local-path-provisioner:
    name: "Deploy Local Path Provisioner"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./  
    steps: 
      - name: Deploy Local Path Provisioner
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf          
          kubectl apply -f kubernetes/rancher-local/
          kubectl get storageclass
  
  deploy-rook-ceph:
    name: "Deploy Rook Ceph"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    steps: 
      - name: Deploy Rook Ceph Cluster
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf    
          kubectl apply -f kubernetes/rook-ceph/crds.yaml
          kubectl apply -f kubernetes/rook-ceph/common.yaml
          kubectl apply -f kubernetes/rook-ceph/csi-operator.yaml
          kubectl apply -f kubernetes/rook-ceph/operator.yaml
          kubectl wait --for=condition=Available deployment/rook-ceph-operator -n rook-ceph --timeout=120s
          kubectl apply -f kubernetes/rook-ceph/cluster.yaml
          kubectl get pods -n rook-ceph
          kubectl apply -f kubernetes/rook-ceph/block-storage/storageclass.yaml
  
  verify-rook-ceph:
    name: "Verify Rook Ceph"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    needs: deploy-rook-ceph
    steps: 
      - name: Verify Rook Ceph
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf
          kubectl apply -f kubernetes/rook-ceph/toolbox.yaml
          kubectl wait --for=condition=Ready pod -l app=rook-ceph-tools -n rook-ceph --timeout=300s
          kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph status
          kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph osd status
          kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph df
          kubectl -n rook-ceph exec deploy/rook-ceph-tools -- rados df
          kubectl delete -f kubernetes/rook-ceph/toolbox.yaml
  
  deploy-cert-manager:
    name: "Deploy Cert-Manager"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    steps: 
      - name: Deploy Cert-Manager
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf          
          kubectl apply -f kubernetes/cert-manager/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl get pods -n cert-manager
          kubectl get svc -n cert-manager
    
  deploy-cluster-issuers:
    name: "Deploy Cluster Issuers"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    needs: deploy-cert-manager
    steps: 
      - name: Deploy Cluster Issuers
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf          
          kubectl create secret generic cloudflare-apitoken-secret \
            --namespace cert-manager \
            --from-literal=apitoken='${{ secrets.CLOUDFLARE_API_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -
         
          kubectl apply -f kubernetes/cert-manager/cluster-issuers.yaml
          kubectl get clusterissuers

  deploy-monitoring:
    name: "Deploy Monitoring Stack"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    needs: deploy-cluster-issuers
    steps: 
      - name: Setup Helm
        uses: azure/setup-helm@v4.2.0

      - name: Deploy Monitoring Stack
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f kubernetes/monitoring/values.yaml
          kubectl get pods -n monitoring
          
  deploy-logging:
    name: "Deploy Logging Stack"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    needs: deploy-monitoring
    steps:
      - name: Setup Helm
        uses: azure/setup-helm@v4.2.0

      - name: Deploy Logging Stack
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install loki-stack grafana/loki-stack \
            --namespace logging \
            --create-namespace \
            -f kubernetes/logging/values.yaml
          kubectl get pods -n logging
          kubectl get svc -n logging

  deploy-argocd:
    name: "Deploy ArgoCD"
    runs-on:
      group: k8s
    defaults:
      run:
        working-directory: ./
    needs: deploy-logging
    steps: 
      - name: Setup Helm
        uses: azure/setup-helm@v4.2.0

      - name: Deploy ArgoCD
        run: |
          export KUBECONFIG=ansible/inventory/artifacts/admin.conf
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            -f kubernetes/argocd/values.yaml
          kubectl get pods -n argocd
          kubectl get svc -n argocd
